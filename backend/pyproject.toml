[project]
name = "backend"
version = "0.1.0"
description = "Seal – personal AI assistant backend"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.115.0",
    "vercel>=0.5.1",
    "asyncpg>=0.29.0",
    "ai>=0.2.0",
    "httpx>=0.28.1",
]

[tool.mypy]
python_version = "3.13"
strict = true
plugins = ["pydantic.mypy"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "standard"
reportMissingTypeStubs = false
reportUnusedCallResult = false

[tool.ruff]
target-version = "py313"
src = ["."]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pydantic>=2.12.5",
    "pyright>=1.1.400",
    "pytest>=9.0.2",
    "ruff>=0.15.5",
]
